[package]
name = "vault-syncd"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "time"] }
serde_cbor = "0.11"
serde_json = "1"
rusqlite = { version = "0.31", features = ["bundled"] }
walkdir = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt"] }
sha2 = "0.10"
hex = "0.4"
rand = "0.8"
zstd = "0.13"
aes-gcm = "0.10"
hkdf = "0.12"
chrono = "0.4"
axum = "0.7"